name: NexusPOS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1: Quality Gates — lint + typecheck + test
  # ────────────────────────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./dev.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Type check (shared)
        working-directory: packages/shared
        run: npx tsc --noEmit

      - name: Type check (renderer)
        working-directory: packages/renderer
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/shared
        run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test

  # ────────────────────────────────────────────────────────
  # JOB 2: Build — Vite production bundle
  # ────────────────────────────────────────────────────────
  build:
    name: Build Application
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Build renderer (Vite)
        working-directory: packages/renderer
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Build main process (esbuild)
        working-directory: packages/main
        run: node build.mjs

      - name: Upload renderer build
        uses: actions/upload-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/
          retention-days: 7

      - name: Upload main process build
        uses: actions/upload-artifact@v4
        with:
          name: main-dist
          path: packages/main/dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # JOB 3: Package Linux (AppImage + deb)
  # ────────────────────────────────────────────────────────
  package-linux:
    name: Package Linux
    needs: build
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev fakeroot rpm

      - name: Install Node dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Download renderer build
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/

      - name: Download main process build
        uses: actions/download-artifact@v4
        with:
          name: main-dist
          path: packages/main/dist/

      - name: Package Linux (standard)
        run: npx electron-builder --linux AppImage deb --publish never --config electron-builder.config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        if: always()
        run: find dist-packages -type f 2>/dev/null | head -20 || echo "No dist-packages found"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist-packages/*.AppImage
            dist-packages/*.deb
          if-no-files-found: warn
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 4: Package Linux Kiosk (AppImage + deb, kiosk mode)
  # ────────────────────────────────────────────────────────
  package-kiosk:
    name: Package Linux Kiosk
    needs: build
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev fakeroot rpm

      - name: Install Node dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Download renderer build
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/

      - name: Download main process build
        uses: actions/download-artifact@v4
        with:
          name: main-dist
          path: packages/main/dist/

      - name: Package Linux Kiosk
        run: npx electron-builder --linux AppImage deb --publish never --config electron-builder.kiosk.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List kiosk build output
        if: always()
        run: find dist-packages/kiosk -type f 2>/dev/null | head -20 || echo "No kiosk packages found"

      - name: Upload Kiosk packages
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-packages
          path: |
            dist-packages/kiosk/*.AppImage
            dist-packages/kiosk/*.deb
          if-no-files-found: warn
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 5: Package Windows (NSIS installer)
  # ────────────────────────────────────────────────────────
  package-windows:
    name: Package Windows
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Download renderer build
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/

      - name: Download main process build
        uses: actions/download-artifact@v4
        with:
          name: main-dist
          path: packages/main/dist/

      - name: Package Windows
        shell: pwsh
        run: |
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          Remove-Item Env:WIN_CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
          npx electron-builder --windows nsis --publish never --config electron-builder.config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist-packages/*.exe
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 6: Package macOS (DMG)
  # ────────────────────────────────────────────────────────
  package-macos:
    name: Package macOS
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    timeout-minutes: 40

    env:
      HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Import code signing certificate
        if: env.HAS_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Download renderer build
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/

      - name: Download main process build
        uses: actions/download-artifact@v4
        with:
          name: main-dist
          path: packages/main/dist/

      - name: Package macOS
        run: npx electron-builder --mac dmg --publish never --config electron-builder.config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: dist-packages/*.dmg
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 7: GitHub Release
  # Attaches all platform packages + kiosk packages to release
  # ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [package-linux, package-kiosk, package-windows, package-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          pattern: '*-packages'
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          body: |
            ## NexusPOS ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `NexusPOS-Setup-*.exe` |
            | Linux    | `NexusPOS-*.AppImage` / `nexuspos_*.deb` |
            | macOS    | `NexusPOS-*.dmg` |
            | **Kiosk (Linux)** | `NexusPOS-Kiosk-*.AppImage` / `nexuspos-kiosk_*.deb` |

            ### Kiosk Deployment
            For dedicated POS kiosk setup on Linux:
            ```bash
            # Install kiosk package
            sudo dpkg -i nexuspos-kiosk_*.deb
            # Run setup script (requires root)
            sudo bash /opt/NexusPOS\ Kiosk/resources/kiosk/setup-kiosk.sh
            sudo reboot
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
