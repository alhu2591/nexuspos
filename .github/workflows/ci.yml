name: NexusPOS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1: Quality Gates — lint + typecheck + test
  # ────────────────────────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./dev.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Type check (shared)
        working-directory: packages/shared
        run: npx tsc --noEmit

      - name: Type check (renderer)
        working-directory: packages/renderer
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/shared
        run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test

  # ────────────────────────────────────────────────────────
  # JOB 2: Build — Vite production bundle
  # ────────────────────────────────────────────────────────
  build:
    name: Build Application
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Build renderer (Vite)
        working-directory: packages/renderer
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Upload renderer build
        uses: actions/upload-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # JOB 3: Package Linux (AppImage + deb)
  # On tags or main branch push
  # ────────────────────────────────────────────────────────
  package-linux:
    name: Package Linux
    needs: build
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev fakeroot rpm

      - name: Install Node dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci

      - name: Download renderer build
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Build main process
        working-directory: packages/main
        run: npx tsc

      - name: Package Linux
        run: npx electron-builder --linux AppImage deb --publish never --config electron-builder.config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output (debug)
        if: always()
        run: find dist-packages -type f 2>/dev/null || echo "dist-packages not found, checking dist/:" && find dist -maxdepth 3 -name "*.AppImage" -o -name "*.deb" 2>/dev/null | head -20

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist-packages/*.AppImage
            dist-packages/*.deb
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 4: Package Windows (NSIS installer)
  # Only on version tags
  # ────────────────────────────────────────────────────────
  package-windows:
    name: Package Windows
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Download renderer build
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Build main process
        working-directory: packages/main
        run: npx tsc
        shell: bash

      - name: Package Windows
        shell: pwsh
        run: |
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          Remove-Item Env:WIN_CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
          npx electron-builder --windows nsis --publish never --config electron-builder.config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist-packages/*.exe
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 5: Package macOS (DMG)
  # Only on version tags — cert is optional via env check
  # ────────────────────────────────────────────────────────
  package-macos:
    name: Package macOS
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    timeout-minutes: 40

    env:
      HAS_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Import code signing certificate
        if: env.HAS_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Download renderer build
        uses: actions/download-artifact@v4
        with:
          name: renderer-dist
          path: packages/renderer/dist/

      - name: Generate Prisma types
        working-directory: packages/database
        run: npx prisma generate --no-engine
        env:
          DATABASE_URL: 'file:./prod.db'
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'

      - name: Build shared package
        working-directory: packages/shared
        run: npx tsc

      - name: Build main process
        working-directory: packages/main
        run: npx tsc

      - name: Package macOS
        run: npx electron-builder --mac dmg --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: dist-packages/*.dmg
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 6: GitHub Release
  # Attaches all platform packages to the release
  # ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [package-linux, package-windows, package-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          pattern: '*-packages'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
